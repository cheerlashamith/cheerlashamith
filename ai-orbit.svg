<svg width="900" height="600" viewBox="0 0 900 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111E"/>
      <stop offset="1" stop-color="#130C2B"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#8B5CF6" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="900" height="600" rx="28" fill="url(#bg)"/>
  <g transform="translate(450 300)" filter="url(#glow)">
    <circle r="170" stroke="#1D4ED8" stroke-opacity="0.35" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="26s" repeatCount="indefinite"/>
    </circle>
    <circle r="122" stroke="#22D3EE" stroke-opacity="0.55" stroke-width="2" stroke-dasharray="12 10">
      <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="18s" repeatCount="indefinite"/>
    </circle>
    <ellipse rx="240" ry="86" stroke="#A78BFA" stroke-opacity="0.35" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="16s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse rx="240" ry="86" transform="rotate(60)" stroke="#F472B6" stroke-opacity="0.28" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="60 0 0" to="420 0 0" dur="19s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse rx="240" ry="86" transform="rotate(120)" stroke="#34D399" stroke-opacity="0.28" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="120 0 0" to="480 0 0" dur="22s" repeatCount="indefinite"/>
    </ellipse>
    <circle r="54" fill="url(#core)"/>
    <circle cx="0" cy="-170" r="10" fill="#67E8F9"/>
    <circle cx="170" cy="0" r="10" fill="#F472B6"/>
    <circle cx="0" cy="170" r="10" fill="#A78BFA"/>
    <circle cx="-170" cy="0" r="10" fill="#34D399"/>
    <circle cx="180" cy="0" r="10" fill="#F472B6">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="-124" r="8" fill="#67E8F9">
      <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="450" y="84" fill="#E5E7EB" text-anchor="middle" font-size="36" font-family="Inter, Arial, sans-serif" font-weight="700">AI • SYSTEMS • AUTOMATION • SCALE</text>
  <text x="450" y="532" fill="#94A3B8" text-anchor="middle" font-size="22" font-family="Inter, Arial, sans-serif">Creative vector orbit illustration for your README showcase</text>
</svg>
