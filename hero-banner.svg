<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="0.45" stop-color="#0B1026"/>
      <stop offset="1" stop-color="#130C30"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 120) rotate(34) scale(360 240)">
      <stop stop-color="#6EE7F9" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6EE7F9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1240 390) rotate(-12) scale(420 260)">
      <stop stop-color="#A855F7" stop-opacity="0.33"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardStroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8BE9FD"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="blur20" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#000814" flood-opacity="0.45"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#99A1FF" stroke-opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1600" height="520" rx="28" fill="url(#bg)"/>
  <rect width="1600" height="520" rx="28" fill="url(#grid)"/>
  <rect x="0" y="0" width="1600" height="520" rx="28" fill="url(#glowA)"/>
  <rect x="0" y="0" width="1600" height="520" rx="28" fill="url(#glowB)"/>

  <g opacity="0.65">
    <circle cx="1380" cy="108" r="4" fill="#8BE9FD">
      <animate attributeName="cy" values="108;100;108" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1450" cy="182" r="5" fill="#F472B6">
      <animate attributeName="cy" values="182;172;182" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1290" cy="206" r="3" fill="#A78BFA">
      <animate attributeName="cy" values="206;196;206" dur="4.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="118" cy="428" r="5" fill="#22D3EE">
      <animate attributeName="cy" values="428;414;428" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g filter="url(#blur20)" opacity="0.7">
    <circle cx="1040" cy="146" r="80" fill="#7C3AED"/>
    <circle cx="1110" cy="320" r="90" fill="#0EA5E9"/>
    <circle cx="1320" cy="250" r="100" fill="#EC4899"/>
  </g>

  <g transform="translate(70 74)">
    <rect x="0" y="0" width="760" height="372" rx="28" fill="#0A1022" stroke="url(#cardStroke)" stroke-opacity="0.55" filter="url(#softShadow)"/>
    <rect x="26" y="24" width="708" height="324" rx="22" fill="#050B18" stroke="#5EEAD4" stroke-opacity="0.12"/>

    <circle cx="58" cy="50" r="7" fill="#FB7185"/>
    <circle cx="84" cy="50" r="7" fill="#FBBF24"/>
    <circle cx="110" cy="50" r="7" fill="#34D399"/>

    <text x="40" y="104" fill="#6EE7F9" font-size="22" font-family="'Fira Code', monospace">const developer = {</text>
    <text x="74" y="148" fill="#E5E7EB" font-size="24" font-family="'Fira Code', monospace">name: <tspan fill="#F9A8D4">"Cheerla Shamith"</tspan>,</text>
    <text x="74" y="192" fill="#E5E7EB" font-size="24" font-family="'Fira Code', monospace">roles: [<tspan fill="#A5B4FC">"Full-Stack"</tspan>, <tspan fill="#67E8F9">"GenAI"</tspan>, <tspan fill="#C084FC">"CP"</tspan>],</text>
    <text x="74" y="236" fill="#E5E7EB" font-size="24" font-family="'Fira Code', monospace">focus: <tspan fill="#34D399">"Scalable apps + AI systems"</tspan>,</text>
    <text x="74" y="280" fill="#E5E7EB" font-size="24" font-family="'Fira Code', monospace">status: <tspan fill="#FDE68A">"Building the future"</tspan></text>
    <text x="40" y="324" fill="#6EE7F9" font-size="22" font-family="'Fira Code', monospace">};</text>

    <rect x="474" y="88" width="206" height="42" rx="21" fill="#0F172A" stroke="#22D3EE" stroke-opacity="0.45"/>
    <text x="505" y="115" fill="#E0F2FE" font-size="18" font-family="Inter, Arial, sans-serif">AI • Web • Cloud • Code</text>

    <g transform="translate(488 172)">
      <circle cx="76" cy="76" r="70" fill="none" stroke="#1D4ED8" stroke-opacity="0.35" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" from="0 76 76" to="360 76 76" dur="18s" repeatCount="indefinite"/>
      </circle>
      <circle cx="76" cy="76" r="48" fill="none" stroke="#A855F7" stroke-opacity="0.55" stroke-width="2" stroke-dasharray="6 8">
        <animateTransform attributeName="transform" type="rotate" from="360 76 76" to="0 76 76" dur="10s" repeatCount="indefinite"/>
      </circle>
      <circle cx="76" cy="76" r="24" fill="url(#accent)"/>
      <circle cx="76" cy="6" r="6" fill="#67E8F9"/>
      <circle cx="146" cy="76" r="7" fill="#F472B6"/>
      <circle cx="76" cy="146" r="6" fill="#A78BFA"/>
      <circle cx="6" cy="76" r="5" fill="#34D399"/>
    </g>
  </g>

  <g transform="translate(900 90)">
    <text x="0" y="44" fill="#E9D5FF" font-size="26" font-family="Inter, Arial, sans-serif" letter-spacing="4">PORTFOLIO README</text>
    <text x="0" y="126" fill="#FFFFFF" font-size="70" font-weight="700" font-family="Inter, Arial, sans-serif">Cheerla</text>
    <text x="0" y="198" fill="url(#accent)" font-size="76" font-weight="800" font-family="Inter, Arial, sans-serif">Shamith</text>
    <text x="0" y="256" fill="#CBD5E1" font-size="28" font-family="Inter, Arial, sans-serif">Full-Stack Developer • Generative AI Engineer</text>
    <text x="0" y="296" fill="#94A3B8" font-size="28" font-family="Inter, Arial, sans-serif">Competitive Programmer • Builder • Problem Solver</text>

    <g transform="translate(0 338)">
      <rect x="0" y="0" width="188" height="58" rx="18" fill="#0F172A" stroke="#22D3EE" stroke-opacity="0.5"/>
      <rect x="206" y="0" width="186" height="58" rx="18" fill="#0F172A" stroke="#A855F7" stroke-opacity="0.5"/>
      <rect x="410" y="0" width="214" height="58" rx="18" fill="#0F172A" stroke="#F472B6" stroke-opacity="0.5"/>
      <text x="28" y="36" fill="#E2E8F0" font-size="24" font-family="Inter, Arial, sans-serif">MERN Systems</text>
      <text x="232" y="36" fill="#E2E8F0" font-size="24" font-family="Inter, Arial, sans-serif">GenAI Workflows</text>
      <text x="438" y="36" fill="#E2E8F0" font-size="24" font-family="Inter, Arial, sans-serif">2K+ Problems Solved</text>
