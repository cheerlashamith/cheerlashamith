<svg width="1100" height="700" viewBox="0 0 1100 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060B18"/>
      <stop offset="1" stop-color="#120C28"/>
    </linearGradient>
    <linearGradient id="outline" x1="122" y1="70" x2="936" y2="622" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1100" height="700" rx="34" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="110" y="72" width="880" height="500" rx="28" fill="#0A1121" stroke="url(#outline)" stroke-opacity="0.7" stroke-width="2"/>
    <rect x="144" y="110" width="812" height="392" rx="22" fill="#060B16"/>
    <circle cx="170" cy="136" r="8" fill="#FB7185"/>
    <circle cx="198" cy="136" r="8" fill="#FBBF24"/>
    <circle cx="226" cy="136" r="8" fill="#34D399"/>
    <rect x="260" y="122" width="208" height="28" rx="14" fill="#0F172A"/>
    <text x="286" y="141" fill="#94A3B8" font-family="'Fira Code', monospace" font-size="16">/portfolio/readme/creative-mode</text>

    <g font-family="'Fira Code', monospace" font-size="22">
      <text x="178" y="200" fill="#67E8F9">$ npm run build-future</text>
      <text x="178" y="248" fill="#E5E7EB">Initializing experience layers...</text>
      <text x="178" y="290" fill="#C084FC">✓ animated hero modules ready</text>
      <text x="178" y="332" fill="#F9A8D4">✓ vector illustrations loaded</text>
      <text x="178" y="374" fill="#A7F3D0">✓ professional README components compiled</text>
      <text x="178" y="416" fill="#FDE68A">✓ typewriter + scramble sequences activated</text>
      <text x="178" y="458" fill="#93C5FD">Deploying standout developer identity...</text>
    </g>

    <g transform="translate(690 192)">
      <rect x="0" y="0" width="200" height="200" rx="30" fill="#0C1427" stroke="#22D3EE" stroke-opacity="0.35"/>
      <circle cx="100" cy="100" r="62" fill="none" stroke="#1D4ED8" stroke-opacity="0.3" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="14s" repeatCount="indefinite"/>
      </circle>
      <circle cx="100" cy="100" r="42" fill="none" stroke="#C084FC" stroke-width="2" stroke-dasharray="10 8">
        <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="100" cy="100" r="20" fill="url(#screenGlow)"/>
      <circle cx="100" cy="38" r="6" fill="#67E8F9"/>
      <circle cx="162" cy="100" r="6" fill="#F472B6"/>
      <circle cx="100" cy="162" r="6" fill="#A78BFA"/>
      <circle cx="38" cy="100" r="6" fill="#34D399"/>
    </g>
  </g>

  <g transform="translate(226 580)">
    <path d="M0 22H648" stroke="#334155" stroke-width="12" stroke-linecap="round"/>
    <path d="M214 22L176 96H472L434 22" fill="#0F172A" stroke="#475569"/>
    <rect x="140" y="96" width="368" height="28" rx="14" fill="#111827" stroke="#334155"/>
