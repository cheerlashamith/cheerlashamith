<svg width="1200" height="170" viewBox="0 0 1200 170" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="revealOne">
      <rect x="0" y="0" width="0" height="80">
        <animate attributeName="width" values="0;820;820;0;0" keyTimes="0;0.25;0.38;0.5;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="revealTwo">
      <rect x="0" y="85" width="0" height="80">
        <animate attributeName="width" values="0;0;0;760;760" keyTimes="0;0.5;0.56;0.82;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>
  <rect width="1200" height="170" rx="24" fill="#0A0F20"/>
  <rect x="1" y="1" width="1198" height="168" rx="23" stroke="#67E8F9" stroke-opacity="0.18"/>
  <g transform="translate(54 34)" font-family="'Fira Code', monospace" font-size="34">
    <text x="0" y="38" fill="#E2E8F0" clip-path="url(#revealOne)">Building scalable web apps • AI systems • developer tools</text>
    <text x="0" y="116" fill="#F9A8D4" clip-path="url(#revealTwo)">Transforming ideas into products with code, design, and automation</text>
    <rect x="0" y="10" width="4" height="40" fill="#67E8F9">
      <animate attributeName="x" values="0;820;820;0;0;0" keyTimes="0;0.25;0.38;0.5;0.75;1" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0;0;1;1;0;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="88" width="4" height="40" fill="#C084FC">
      <animate attributeName="x" values="0;0;0;760;760" keyTimes="0;0.5;0.56;0.82;1" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0;1;1;0;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
